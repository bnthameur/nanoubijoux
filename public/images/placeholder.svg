<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f5f3ef"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="#d4af37" stroke-width="2.5" opacity="0.4"/>

  <!-- Diamond / gem shape -->
  <polygon points="200,120 240,165 200,240 160,165" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <polygon points="200,120 240,165 200,195 160,165" fill="#d4af37" opacity="0.15"/>
  <line x1="160" y1="165" x2="240" y2="165" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="120" x2="200" y2="195" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

  <!-- Small sparkle top-right -->
  <g transform="translate(260, 140)" opacity="0.5">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#d4af37" stroke-width="1"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#d4af37" stroke-width="1"/>
  </g>

  <!-- Small sparkle bottom-left -->
  <g transform="translate(140, 265)" opacity="0.35">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#d4af37" stroke-width="1.5"/>
  </g>

  <!-- Text label -->
  <text x="200" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b8a070" letter-spacing="2" opacity="0.7">BIJOUX</text>
</svg>
